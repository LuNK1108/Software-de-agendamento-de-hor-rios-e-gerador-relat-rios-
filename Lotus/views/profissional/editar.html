<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de profissional</title>
</head>
<link rel="stylesheet" href="../../assets/css/paciente/paciente_inserir.css">
<body>

<h2>editar profissional</h2>

<form action="#" method="POST">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required>

    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" name="cpf" required>

    <label for="telefone">Telefone:</label>
    <input type="number" id="telefone" name="telefone" required>

    <label for="cargo">Cargo:</label>
    <input type="int" id="cargo" name="cargo" required>

    <div class="btn-container">
        <button type="button" class="btn btn-cadastrar" onclick="editar_profissional()">salvar</button>
        <button type="button" class="btn btn-voltar" onclick="window.history.back()">Voltar</button>
    </div>
</form>


</body>
    <script src="../../assets/js/profissional/profissional_get.js"></script>
    <script src="../../assets/js/profissional/profissional_editar.js"></script>
</html>
