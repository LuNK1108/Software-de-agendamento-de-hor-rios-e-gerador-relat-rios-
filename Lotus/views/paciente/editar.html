<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Paciente</title>
    <link rel="stylesheet" href="../../assets/css/paciente/paciente_editar.css">
</head>
<body>

    

    <div class="form-container">
        <h1>Editar Paciente</h1>
        <form action="#" method="POST" id="form-editar-paciente">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="senha">Senha:</label>
            <input type="text" id="senha" name="senha" required>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required>

            <button type="button" onclick="editar_paciente()">Salvar</button>
            <br>
            <button type="button" onclick="window.history.back()">Voltar</button>

        </form>
    </div>

    <script src="../../assets/js/paciente/paciente_get.js"></script>
    <script src="../../assets/js/paciente/paciente_editar.js"></script>
</body>
</html>
