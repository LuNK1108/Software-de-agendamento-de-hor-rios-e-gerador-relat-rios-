<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Paciente</title>
</head>
<link rel="stylesheet" href="../../assets/css/paciente/paciente_inserir.css">
<body>

<h2>Cadastro de Paciente</h2>

<form action="#" method="POST">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" required>

    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" name="cpf" required>

    <div class="btn-container">
        <button type="button" class="btn btn-cadastrar" onclick="inserir_paciente()">Cadastrar</button>
        <button type="button" class="btn btn-voltar" onclick="window.history.back()">Voltar</button>
    </div>
</form>


</body>
    <script src="../../assets/js/paciente/paciente_inserir.js"></script>
    <script src="../../assets/js/paciente/paciente_listar.js"></script>
</html>
